<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
    .navbar {
        background: linear-gradient(135deg, #1f1f2e, #2c3e50);
    }

    .navbar-brand {
        font-size: 20px;
        letter-spacing: 0.5px;
    }

    .nav-link {
        color: #dcdcdc !important;
        font-weight: 500;
        margin-right: 8px;
        transition: 0.3s;
    }

    .nav-link:hover {
        color: #ffc107 !important;
        transform: translateY(-1px);
    }

    .nav-link.active {
        color: #ffc107 !important;
        font-weight: 600;
    }

    .dropdown-menu {
        border-radius: 12px;
        border: none;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .btn-user {
        border-radius: 30px;
        font-weight: 500;
        padding: 6px 14px;
    }
</style>

<nav class="navbar navbar-expand-lg navbar-dark shadow">

  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand fw-bold text-warning" href="{% url 'home' %}">
        <i class="bi bi-graph-up-arrow"></i> FinSight
    </a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="navbarContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link active" href="{% url 'home' %}">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'budget' %}">
            <i class="bi bi-wallet2"></i> Budget
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'expadd' %}">
            <i class="bi bi-plus-circle"></i> Add Expense
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'expense_list' %}">
            <i class="bi bi-bar-chart-line"></i> Expenses
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'monthly_report' %}?month=4&year=2026">
            <i class="bi bi-file-earmark-pdf"></i> Report
          </a>
        </li>

      </ul>

      <!-- User Dropdown -->
      <div class="dropdown">

        <button class="btn btn-warning btn-user dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle"></i>
          {{ request.session.user_name }}
        </button>

        <ul class="dropdown-menu dropdown-menu-end">

          <li>
            <a class="dropdown-item" href="{% url 'profile' %}">
              <i class="bi bi-person"></i> Profile
            </a>
          </li>

          <li><hr class="dropdown-divider"></li>

          <li>
            <a class="dropdown-item text-danger" href="{% url 'logout' %}">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>

        </ul>

      </div>

    </div>
  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
