<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
        }

        .login-card {
            border: none;
            border-radius: 18px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .brand-title {
            font-size: 34px;
            font-weight: 700;
            color: #4e73df;
        }

        .brand-subtitle {
            font-size: 13px;
            color: #6c757d;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .btn-login {
            border-radius: 10px;
            font-weight: 600;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            border: none;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .register-link {
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-4">

            <div class="card login-card p-4">

                <!-- BRAND -->
                <div class="text-center mb-4">
                    <div class="brand-title">💰 FinSight</div>
                    <div class="brand-subtitle">Smart Expense Tracking System</div>
                </div>

                <!-- FORM -->
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="txtemail" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="txtpassword" class="form-control" placeholder="Enter password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-login text-white">
                            Login
                        </button>
                    </div>
                </form>

                <!-- REGISTER -->
                <p class="text-center mt-3 register-link">
                    Don’t have an account?
                    <a href="{% url 'register' %}" class="fw-semibold text-decoration-none text-primary">
                        Create Account
                    </a>
                </p>

            </div>

        </div>

    </div>
</div>

</body>
</html>
